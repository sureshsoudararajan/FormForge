services:
  - type: web
    name: formforge-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run db:generate && npm run db:push && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: formforge-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        value: 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
      - key: NODE_ENV
        value: production
